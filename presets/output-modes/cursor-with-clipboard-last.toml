# Output mode preset: direct cursor + clipboard mirror
#
# Use when you want immediate typing, but also want the last finalized utterance
# available in the clipboard as a manual recovery path.

[output.file_buffer]
enabled = false

[output.clipboard_replace]
enabled = true

[output.clipboard_accumulate]
enabled = false

[output.type_at_cursor]
enabled = true
undo_mode = "ctrl+z"
undo_backspace_count = 24

[output.trailing_char]
enabled = true
char    = " "

[voice_commands.type_at_cursor_toggle]
enabled = true
words   = ["typing"]

[voice_commands.undo]
enabled = true
words   = ["undo"]

[voice_commands.buffer_release]
enabled = false
words   = ["buffer"]
press_enter_after = false

[voice_commands.buffer_clear]
enabled = false
words   = ["clear"]
