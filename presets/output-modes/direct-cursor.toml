# Output mode preset: direct cursor
#
# Use when you want finalized transcripts typed into the active app immediately.
# Buffering is disabled. Clipboard is disabled. `undo` targets type_at_cursor.

[output.file_buffer]
enabled = false

[output.clipboard_replace]
enabled = false

[output.clipboard_accumulate]
enabled = false

[output.type_at_cursor]
enabled = true
undo_mode = "ctrl+z"
undo_backspace_count = 24

[output.trailing_char]
enabled = true
char    = " "

[voice_commands.type_at_cursor_toggle]
enabled = true
words   = ["typing"]

[voice_commands.undo]
enabled = true
words   = ["undo"]

[voice_commands.buffer_release]
enabled = false
words   = ["buffer"]
press_enter_after = false

[voice_commands.buffer_clear]
enabled = false
words   = ["clear"]
