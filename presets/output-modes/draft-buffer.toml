# Output mode preset: draft buffer
#
# Use when you want to speak into the buffer first, then explicitly release it.
# This matches the workflow: `typing` -> `clear` -> speak -> `buffer` -> repeat.

[output.file_buffer]
enabled = true
path = "buffer.txt"
separator = ""
clear_after_release = true
reset_after_each_message = false

[output.clipboard_replace]
enabled = false

[output.clipboard_accumulate]
enabled = false

[output.type_at_cursor]
enabled = true
undo_mode = "ctrl+z"
undo_backspace_count = 24

[output.trailing_char]
enabled = true
char    = " "

[voice_commands.type_at_cursor_toggle]
enabled = true
words   = ["typing"]

[voice_commands.undo]
enabled = true
words   = ["undo"]

[voice_commands.buffer_release]
enabled = true
words   = ["buffer"]
press_enter_after = false

[voice_commands.buffer_clear]
enabled = true
words   = ["clear"]
