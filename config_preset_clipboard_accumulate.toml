[models]
# faster-whisper models:
#   tiny, tiny.en, base, base.en, small, small.en, medium, medium.en
#   large-v1, large-v2, large-v3, large-v3-turbo, large
#   distil-large-v2, distil-large-v3, distil-medium.en, distil-small.en
# ".en" variants are English-only but faster. Use non-.en for multilingual.
# Can also be a local path or HuggingFace model ID.
final          = "large-v3-turbo"
realtime       = "tiny.en"   # set to "" to disable partials entirely

# device: "cuda", "cpu", or "auto"
final_device    = "cuda"
realtime_device = "cuda"

# compute_type (faster-whisper / ctranslate2):
#   float16       — GPU only, fastest, recommended for cuda
#   bfloat16      — GPU, newer cards
#   int8_float16  — GPU, quantized weights, less VRAM
#   int8_bfloat16 — GPU, quantized weights, bfloat16
#   int8_float32  — quantized weights, float32 ops
#   int8          — CPU or GPU, lowest memory
#   int16         — 16-bit integer quantization
#   float32       — CPU fallback (used automatically if GPU doesn't support float16)
#   default       — let ctranslate2 decide (recommended for cpu)
final_compute  = "float16"

# language: BCP-47 code e.g. "en", "fr", "de", "ja" — or remove/set to "" for auto-detect (slower)
# auto-detect analyzes first 30s of audio. English-only models always use "en" regardless.
language       = "en"

[audio]
rate            = 16000  # sample rate — Whisper requires 16000, do not change
chunk           = 512    # audio frames per VAD check — lower = more responsive, higher = more stable
vad_threshold   = 0.4   # Silero VAD sensitivity 0–1 (lower = more sensitive, picks up more speech)
buffer_seconds  = 1.0   # ring buffer before speech start — captures audio before VAD triggers
silence_timeout = 0.8   # seconds of silence before ending an utterance and firing final transcription
input_stall_reset_seconds = 1.5 # if audio capture stalls this long mid-utterance, drop buffered speech instead of resuming it later
# startup input device override by exact device name; empty = use remembered device then OS default
input_device    = ""

[realtime]
# check_interval: how often (seconds) a partial transcription is triggered during speech
check_interval   = 0.1
# min_chunks: minimum audio chunks before attempting a partial (avoids transcribing too little audio)
# max_chunks: stop attempting partials beyond this length (avoids slow inference on long utterances)
# 1 chunk = 512 samples at 16000hz = ~32ms
min_chunks       = 10
max_chunks       = 50
# queue_size: max pending partial jobs — oldest dropped if full (keeps latency low)
queue_size       = 10

# ── Transcript filters ───────────────────────────────────────────────────────
# Exact phrases to swallow completely from both partial and final output.
# Matching is case-insensitive, ignores trailing punctuation, and treats hyphens like spaces.
[filters]
ignored_exact_phrases = ["you", "thank you", "okay", "ok", "hmm", "mm-hmm"]
# Optional whole-word/phrase stripping inside otherwise valid transcripts.
# This is separate from `ignored_exact_phrases`: the utterance still passes through after removal and punctuation cleanup.
disfluency_words = ["uh", "um", "er", "ah", "oh", "fucking"]

# ── Logging / Debugging ──────────────────────────────────────────────────────
[logging]
# debug: when true, detailed runtime traces are written to `file`
debug = true
# append-only debug log file for investigating stalls / missed audio / queue pressure
file = "stt-debug.log"
# include DEBUG logs from faster-whisper / ctranslate2 too; usually leave false unless needed
third_party_debug = false
# throttled runtime snapshot cadence while debug logging is enabled
heartbeat_seconds = 5.0

# ── Output handlers ─────────────────────────────────────────────────────────
# Disable if not needed or when a NATS consumer replaces them.
# TOML booleans must be lowercase
[output.file_append]
enabled = true
path    = "output.txt"

[output.file_overwrite]
enabled = false
path    = "watched.txt"

[output.file_buffer]
enabled = true
path    = "buffer.txt"
separator = ""
clear_after_release = true
reset_after_each_message = false

# use either output.clipboard_replace or output.clipboard_accumulate, not both at once
[output.clipboard_replace]
enabled = false

# output.clipboard_accumulate accumulates text into clipboard until clipboard_accumulate_cycle hotkey is pressed, at which point it empties clipboard and starts accumulating again
[output.clipboard_accumulate]
enabled   = true
separator = ""

[output.type_at_cursor]
enabled = true

[output.trailing_char]
enabled = true
char    = " "

# ── Feedback sounds ──────────────────────────────────────────────────────────
[feedback]
enabled = true
on_sound = "sounds/on.ogg"
off_sound = "sounds/off.ogg"
silence_sound = "sounds/silence.ogg"
final_sound = "sounds/final.ogg"
final_sound_enabled = true
on_volume = 1.0
off_volume = 1.0
final_volume = 1.0
# optional exact output device name for feedback sounds; empty = remembered last output device, then OS default
output_device = ""

# ── Voice commands ────────────────────────────────────────────────────────────
# Optional: simple exact-match commands on final transcriptions.
# If enabled, matching utterances are "consumed" (not output/typed).
#
# Designed for workflow glue (e.g. say "enter" to press Enter). Not a full voice command engine, a proper voice command engine is intended over NATS.
[voice_commands]
enabled = true

[voice_commands.enter]
enabled = true
words   = ["enter", "simba"] # Detected at the start and at the end of utterance, not detected in the middle of utterance.
[voice_commands.type_at_cursor_toggle]
enabled = true
words   = ["typing"] # Detected at the start of utterance
[voice_commands.buffer_release]
enabled = true
words   = ["buffer"]
press_enter_after = true
[voice_commands.buffer_clear]
enabled = true
words   = ["clear"]

# ── Sleep / Wake ─────────────────────────────────────────────────────────────
# Two modes:
# - sleeping: waits for wake word only (no partial/final output)
# - working: normal STT (partials + finals)
# Say a stop word or press the sleep_toggle hotkey to go back to sleeping.

[sleep_wake]
enabled = true
backend = "pvporcupine"            # supported: pvporcupine
wake_word = "bumblebee"            # must be a supported built-in Porcupine keyword
# Built-in Porcupine wake words:
# alexa, americano, blueberry, bumblebee, computer, grapefruit, grasshopper,
# hey google, hey siri, jarvis, ok google, pico clock, picovoice, porcupine, terminator
sensitivity = 0.8                  # 0..1, higher = more sensitive
drop_audio_after_wake_seconds = 0.4  # helps avoid wake word leaking into first transcription
start_sleeping = true
stop_words = ["sleep", "mufasa"]

# ── Hotkeys ──────────────────────────────────────────────────────────────────
# Empty string = disabled.

[hotkeys]
sleep_toggle         = "`"         # toggles sleeping <-> working
sleep_toggle_suppress = false       # if true, swallows the sleep_toggle key so it does not reach other apps
typing_toggle        = "shift+f5"  # toggles type_at_cursor output
input_device_cycle   = "shift+f6"  # cycles input device
output_device_cycle  = "shift+f7"  # cycles audio feedback output device
console_toggle       = "shift+f8"  # hides/shows the STT console so you can bring it back and Ctrl+C it
clipboard_accumulate_cycle = "ctrl+b"   # if output.clipboard_accumulate is enabled, clears clipboard and starts fresh accumulation

# ── NATS ─────────────────────────────────────────────────────────────────────
# Requires nats-py installed. STT works fully without NATS.

[nats]
enabled         = false
url             = "nats://localhost:4222"
subject_emit    = "stt"
subject_control = "stt.control"

# ── State ────────────────────────────────────────────────────────────────────

[state]
file = "state.json"
